services:
  - type: web
    name: claudeproxy
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 3000
      - key: BROWSER
        value: chromium
      - key: ANTHROPIC_EMAIL
        sync: false
      - key: ANTHROPIC_PASSWORD
        sync: false
    disk:
      name: claude-profile
      mountPath: /app/claude_profile
      sizeGB: 1
